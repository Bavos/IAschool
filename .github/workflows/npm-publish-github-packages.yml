name: Render Video

on:
  push:
    # O workflow só roda se houver mudanças nestes arquivos específicos[cite: 7]
    paths: 
      - 'data/sceneData.json'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/render.yml'
  # Permite que você execute o render manualmente pela aba "Actions" no GitHub
  workflow_dispatch:

jobs:
  render:
    name: Gerar MP4 da IAmazing School
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixando código do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurando Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalando dependências
        # Instala o Remotion e as bibliotecas do projeto[cite: 5]
        run: npm install

      - name: 🔍 Validando TypeScript
        # Garante que não existem erros de código antes de renderizar
        run: npm run build

      - name: 🎬 Renderizando vídeo
        # Executa a renderização do arquivo MP4 final
        run: npm run render

      - name: 📤 Salvando o vídeo pronto
        # Salva o arquivo out/video.mp4 como um artefato do GitHub[cite: 3, 5]
        uses: actions/upload-artifact@v4
        with:
          name: iamazing-school-video
          path: out/video.mp4
